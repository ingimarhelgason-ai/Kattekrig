<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Katte Krige</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f0f1a;
    --panel: #1a1a2e;
    --accent: #e94560;
    --gold: #f5a623;
    --text: #eaeaea;
    --muted: #7777aa;
  }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
  }
  .screen { display: none; flex-direction: column; height: 100dvh; align-items: center; justify-content: center; padding: 20px; }
  .screen.active { display: flex; }

  #setup-screen {
    background: radial-gradient(ellipse at 50% -10%, #2a1040 0%, var(--bg) 65%);
    overflow-y: auto;
  }
  .logo { font-family: 'Boogaloo', cursive; font-size: 2.8rem; color: var(--gold); text-shadow: 0 0 40px rgba(245,166,35,0.5); margin-bottom: 2px; text-align:center; }
  .tagline { color: var(--muted); font-size: 0.82rem; margin-bottom: 24px; text-align:center; }

  .card {
    background: var(--panel); border-radius: 20px; padding: 22px 18px;
    width: 100%; max-width: 360px;
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .lbl { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px; }
  input[type=text] {
    width: 100%; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    padding: 11px 14px; color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 1rem;
    margin-bottom: 16px; outline: none; transition: border-color 0.2s;
  }
  input[type=text]:focus { border-color: var(--gold); }

  .avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 14px; }
  .av-btn {
    font-size: 1.5rem; background: rgba(255,255,255,0.04);
    border: 2px solid transparent; border-radius: 10px;
    padding: 5px; cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .av-btn.sel { border-color: var(--gold); background: rgba(245,166,35,0.12); transform: scale(1.1); }

  .color-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 7px; margin-bottom: 20px; }
  .cl-btn {
    width: 100%; aspect-ratio: 1; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer; transition: all 0.15s;
  }
  .cl-btn.sel { border-color: rgba(255,255,255,0.9); transform: scale(1.2); }

  .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 16px 0; }

  .btn {
    width: 100%; padding: 13px; border: none; border-radius: 12px;
    font-family: 'Boogaloo', cursive; font-size: 1.2rem; letter-spacing: 1px;
    cursor: pointer; transition: all 0.2s; margin-bottom: 8px; display: block;
  }
  .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 20px rgba(233,69,96,0.35); }
  .btn-secondary { background: rgba(255,255,255,0.07); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
  .btn:active { transform: scale(0.97); }
  .join-area { display: none; margin-top: 4px; }
  .join-area.open { display: block; }

  #game-screen { padding: 0; position: relative; }
  #map { position: absolute; inset: 0; z-index: 1; }

  .hud-top {
    position: absolute; top: 12px; left: 12px; right: 12px;
    z-index: 1000; display: flex; align-items: center; gap: 8px; pointer-events: none;
  }
  .pill {
    background: rgba(10,10,20,0.88); backdrop-filter: blur(12px);
    border-radius: 50px; border: 1px solid rgba(255,255,255,0.09);
    padding: 7px 14px; display: flex; align-items: center; gap: 7px;
  }
  .pill-av { font-size: 1.25rem; }
  .pill-nm { font-family: 'Boogaloo', cursive; font-size: 0.92rem; }
  .pill-dot { width: 8px; height: 8px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); }
  .score-pill {
    margin-left: auto;
    background: rgba(10,10,20,0.88); backdrop-filter: blur(12px);
    border-radius: 50px; border: 1px solid rgba(255,255,255,0.09);
    padding: 7px 14px;
    font-family: 'Boogaloo', cursive; font-size: 0.9rem; color: var(--gold);
    white-space: nowrap;
  }

  .hud-bottom {
    position: absolute; bottom: 18px; left: 16px; right: 16px;
    z-index: 1000; display: flex; flex-direction: column; align-items: center; gap: 7px;
  }
  .status {
    background: rgba(10,10,20,0.82); backdrop-filter: blur(10px);
    border-radius: 50px; padding: 7px 18px;
    font-size: 0.78rem; color: var(--muted);
    border: 1px solid rgba(255,255,255,0.07); text-align: center;
  }

  .toast {
    position: absolute; top: 68px; left: 50%; transform: translateX(-50%) translateY(-8px);
    background: rgba(10,10,20,0.95); border-radius: 50px; padding: 8px 20px;
    font-size: 0.86rem; font-weight: 700; z-index: 2000;
    border: 1px solid rgba(255,255,255,0.1);
    opacity: 0; transition: all 0.3s; white-space: nowrap; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .loader {
    position: absolute; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; gap: 14px;
  }
  .loader-cat { font-size: 3rem; animation: bob 0.7s infinite alternate; }
  @keyframes bob { to { transform: translateY(-12px); } }
  .loader-txt { color: var(--muted); font-size: 0.85rem; }

  .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }
  .cat-marker { font-size: 1.6rem; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }

  .piss-btn {
    background: var(--gold);
    border: none; border-radius: 50px;
    padding: 15px 40px;
    font-family: 'Boogaloo', cursive; font-size: 1.6rem;
    color: #0f0f1a; cursor: pointer;
    box-shadow: 0 6px 30px rgba(245,166,35,0.5);
    transition: all 0.15s; letter-spacing: 1px;
  }
  .piss-btn:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(245,166,35,0.3); }
  .piss-btn:disabled { background: #444; color: #888; box-shadow: none; cursor: not-allowed; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup-screen" class="screen active">
  <div class="logo">🐱 Katte Krige</div>
  <div class="tagline">Gå ud. Erobre København. Én firkant ad gangen.</div>
  <div class="card">
    <div class="lbl">Dit katte-navn</div>
    <input type="text" id="cat-name" placeholder="Felix, Muffin, Tigger..." maxlength="16"/>

    <div class="lbl">Vælg din kat</div>
    <div class="avatar-grid">
      <button class="av-btn sel" data-a="🐱">🐱</button>
      <button class="av-btn" data-a="🐈">🐈</button>
      <button class="av-btn" data-a="🐈‍⬛">🐈‍⬛</button>
      <button class="av-btn" data-a="😸">😸</button>
      <button class="av-btn" data-a="😾">😾</button>
      <button class="av-btn" data-a="🙀">🙀</button>
      <button class="av-btn" data-a="😼">😼</button>
      <button class="av-btn" data-a="😿">😿</button>
      <button class="av-btn" data-a="🐯">🐯</button>
      <button class="av-btn" data-a="🦁">🦁</button>
    </div>

    <div class="lbl">Din farve</div>
    <div class="color-grid">
      <div class="cl-btn sel" data-c="#e94560" style="background:#e94560"></div>
      <div class="cl-btn" data-c="#ff6b35" style="background:#ff6b35"></div>
      <div class="cl-btn" data-c="#f5a623" style="background:#f5a623"></div>
      <div class="cl-btn" data-c="#f9e64f" style="background:#f9e64f"></div>
      <div class="cl-btn" data-c="#96ceb4" style="background:#96ceb4"></div>
      <div class="cl-btn" data-c="#00b894" style="background:#00b894"></div>
      <div class="cl-btn" data-c="#4ecdc4" style="background:#4ecdc4"></div>
      <div class="cl-btn" data-c="#45b7d1" style="background:#45b7d1"></div>
      <div class="cl-btn" data-c="#0984e3" style="background:#0984e3"></div>
      <div class="cl-btn" data-c="#6c5ce7" style="background:#6c5ce7"></div>
      <div class="cl-btn" data-c="#a29bfe" style="background:#a29bfe"></div>
      <div class="cl-btn" data-c="#fd79a8" style="background:#fd79a8"></div>
      <div class="cl-btn" data-c="#ffffff" style="background:#ffffff; border-color:rgba(255,255,255,0.4)"></div>
      <div class="cl-btn" data-c="#b2bec3" style="background:#b2bec3"></div>
      <div class="cl-btn" data-c="#e17055" style="background:#e17055"></div>
      <div class="cl-btn" data-c="#2d3436" style="background:#2d3436; border-color:rgba(255,255,255,0.15)"></div>
    </div>

    <div class="divider"></div>
    <button class="btn btn-primary" onclick="startGame()">🐾 Spil!</button>
    <button class="btn btn-secondary" onclick="toggleJoin()">🔑 Deltag med kode</button>
    <div class="join-area" id="join-area">
      <input type="text" id="join-code" placeholder="Spilkode" maxlength="10" style="text-transform:uppercase; margin-top:10px;"/>
      <button class="btn btn-primary" onclick="joinGame()">🐾 Deltag</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="loader" id="loader">
    <div class="loader-cat" id="loader-cat">🐱</div>
    <div class="loader-txt">Finder din position...</div>
  </div>
  <div id="map"></div>
  <div class="hud-top">
    <div class="pill">
      <span class="pill-av" id="hud-av">🐱</span>
      <span class="pill-nm" id="hud-nm">Felix</span>
      <span class="pill-dot" id="hud-dot"></span>
    </div>
    <div class="score-pill" id="score-pill">0 firkanter</div>
  </div>
  <div class="hud-bottom">
    <div class="status" id="status">Gå ud og erobre territorium 🐾</div>
    <button class="piss-btn" id="piss-btn" disabled>💦 PIS!</button>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxWGSp1LqwQ5wNwHAcb0JXOGO6GT1tnr8",
  authDomain: "katte-krige.firebaseapp.com",
  databaseURL: "https://katte-krige-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "katte-krige",
  storageBucket: "katte-krige.firebasestorage.app",
  messagingSenderId: "977863742514",
  appId: "1:977863742514:web:5c3b23f7ab4c35563f982b"
};

const app  = initializeApp(firebaseConfig);
const db   = getDatabase(app);
const auth = getAuth(app);

const GRID_LAT   = 0.00036;
const GRID_LNG   = 0.00055;
const CONTEST_MS = 4 * 60 * 60 * 1000;
const OFFLINE_MS = 8 * 60 * 1000;

let myUid, myName, myAvatar, myColor, gameCode;
let map, myMarker;
let currentCellKey = null;
let cells = {};
let cellLayers = {};
let otherMarkers = {};
let selAvatar = '🐱', selColor = '#e94560';

// Avatar / color pickers
document.querySelectorAll('.av-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.av-btn').forEach(x => x.classList.remove('sel'));
  b.classList.add('sel'); selAvatar = b.dataset.a;
}));
document.querySelectorAll('.cl-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.cl-btn').forEach(x => x.classList.remove('sel'));
  b.classList.add('sel'); selColor = b.dataset.c;
}));

window.toggleJoin = () => document.getElementById('join-area').classList.toggle('open');

function genCode() {
  const w = ['TIGER','FELIX','MJAV','POTE','HALE','PELS','KLOV','STREG'];
  return w[Math.floor(Math.random()*w.length)] + (Math.floor(Math.random()*90)+10);
}

// Pre-fill from localStorage
const saved = localStorage.getItem('kattekrige_cat');
if (saved) {
  try {
    const p = JSON.parse(saved);
    document.getElementById('cat-name').value = p.name || '';
    if (p.avatar) {
      document.querySelectorAll('.av-btn').forEach(b => b.classList.toggle('sel', b.dataset.a === p.avatar));
      selAvatar = p.avatar;
    }
    if (p.color) {
      document.querySelectorAll('.cl-btn').forEach(b => b.classList.toggle('sel', b.dataset.c === p.color));
      selColor = p.color;
    }
  } catch(e) {}
}

function validate() {
  const n = document.getElementById('cat-name').value.trim();
  if (!n) { toast('Hvad hedder din kat? 🐱'); return null; }
  return n;
}

window.startGame = async () => {
  const n = validate(); if (!n) return;
  myName = n; myAvatar = selAvatar; myColor = selColor;
  gameCode = 'VERDEN'; // one shared world
  await boot();
};

window.joinGame = async () => {
  const n = validate(); if (!n) return;
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!code) { toast('Indtast en kode'); return; }
  myName = n; myAvatar = selAvatar; myColor = selColor;
  gameCode = code;
  await boot();
};

async function boot() {
  localStorage.setItem('kattekrige_cat', JSON.stringify({ name: myName, avatar: myAvatar, color: myColor }));

  const cred = await signInAnonymously(auth);
  myUid = cred.user.uid;

  document.getElementById('hud-av').textContent = myAvatar;
  document.getElementById('hud-nm').textContent = myName;
  document.getElementById('hud-dot').style.background = myColor;
  document.getElementById('loader-cat').textContent = myAvatar;

  await set(ref(db, `games/${gameCode}/players/${myUid}`), {
    name: myName, avatar: myAvatar, color: myColor,
    lat: 0, lng: 0, lastSeen: Date.now()
  });

  document.getElementById('setup-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');

  initMap();
  listenCells();
  listenPlayers();
  startGPS();
}

function initMap() {
  map = L.map('map', { center: [55.706, 12.52], zoom: 17, zoomControl: false, attributionControl: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);
}

function snapCell(lat, lng) {
  return {
    lat: Math.round(lat / GRID_LAT) * GRID_LAT,
    lng: Math.round(lng / GRID_LNG) * GRID_LNG
  };
}
function cellKey(lat, lng) {
  const s = snapCell(lat, lng);
  return `${s.lat.toFixed(5)}_${s.lng.toFixed(5)}`;
}
function cellBounds(lat, lng) {
  const s = snapCell(lat, lng);
  return [[s.lat - GRID_LAT/2, s.lng - GRID_LNG/2],[s.lat + GRID_LAT/2, s.lng + GRID_LNG/2]];
}

function startGPS() {
  if (!navigator.geolocation) {
    toast('GPS ikke tilgængeligt 😿');
    document.getElementById('loader').style.display = 'none';
    myCurrentPos = { lat, lng };
    document.getElementById('piss-btn').disabled = false;
    document.getElementById('piss-btn').addEventListener('click', pisNow);
    return;
  }
  navigator.geolocation.watchPosition(pos => {
    const { latitude: lat, longitude: lng, accuracy } = pos.coords;
    document.getElementById('loader').style.display = 'none';

    if (!myMarker) {
      map.setView([lat, lng], 17);
      myMarker = L.marker([lat, lng], {
        icon: L.divIcon({ className:'', html:`<div class="cat-marker">${myAvatar}</div>`, iconSize:[32,32], iconAnchor:[16,16] }),
        zIndexOffset: 1000
      }).addTo(map);
    } else {
      myMarker.setLatLng([lat, lng]);
      map.panTo([lat, lng], { animate: true, duration: 0.5 });
    }

    myCurrentPos = { lat, lng };
    update(ref(db, `games/${gameCode}/players/${myUid}`), { lat, lng, lastSeen: Date.now() });

    const key = cellKey(lat, lng);
    if (key !== currentCellKey) {
      currentCellKey = key;
      claimCell(lat, lng, key);
    }

    const acc = Math.round(accuracy);
    document.getElementById('status').textContent =
      acc < 20 ? '🐾 Godt signal — erobre løs!' :
      acc < 50 ? `📡 Signal OK (±${acc}m)` :
                 `📡 Svagt signal (±${acc}m)`;

  }, () => {
    document.getElementById('loader').style.display = 'none';
    toast('Kunne ikke finde position 😿');
  }, { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 });
}

async function claimCell(lat, lng, key) {
  const cell = cells[key];
  const now = Date.now();

  if (!cell) {
    await set(ref(db, `games/${gameCode}/cells/${key}`), {
      owner: myUid, ownerName: myName, ownerColor: myColor, ownerAvatar: myAvatar,
      contested: false, claimedAt: now
    });
    toast(`${myAvatar} Ny firkant! 🐾`);
  } else if (cell.owner === myUid) {
    await update(ref(db, `games/${gameCode}/cells/${key}`), { claimedAt: now });
  } else if (cell.contested && cell.contestedBy === myUid) {
    await set(ref(db, `games/${gameCode}/cells/${key}`), {
      owner: myUid, ownerName: myName, ownerColor: myColor, ownerAvatar: myAvatar,
      contested: false, claimedAt: now
    });
    toast(`😼 TAGET fra ${cell.ownerAvatar} ${cell.ownerName}!`);
  } else {
    await update(ref(db, `games/${gameCode}/cells/${key}`), {
      contested: true, contestedBy: myUid, contestedByName: myName,
      contestedByColor: myColor, contestedByAvatar: myAvatar, contestTime: now
    });
    toast(`😾 Anfægtet ${cell.ownerAvatar} ${cell.ownerName}s firkant!`);
  }
}

function listenCells() {
  onValue(ref(db, `games/${gameCode}/cells`), snap => {
    cells = snap.val() || {};
    renderCells();
    updateScore();
    // Contest decay + notifications
    const now = Date.now();
    Object.entries(cells).forEach(async ([key, cell]) => {
      if (cell.contested && (now - cell.contestTime) > CONTEST_MS) {
        await set(ref(db, `games/${gameCode}/cells/${key}`), {
          owner: cell.contestedBy, ownerName: cell.contestedByName,
          ownerColor: cell.contestedByColor, ownerAvatar: cell.contestedByAvatar,
          contested: false, claimedAt: now
        });
      }
      if (cell.contested && cell.owner === myUid) {
        const nk = `n_${key}_${cell.contestTime}`;
        if (!sessionStorage.getItem(nk)) {
          sessionStorage.setItem(nk, '1');
          toast(`😾 SSSS! ${cell.contestedByAvatar} ${cell.contestedByName} angriber!`);
        }
      }
    });
  });
}

function renderCells() {
  Object.entries(cells).forEach(([key, cell]) => {
    const [a, b] = key.split('_');
    const bounds = cellBounds(parseFloat(a), parseFloat(b));
    const isMine = cell.owner === myUid;
    const opts = {
      fillColor: cell.ownerColor,
      fillOpacity: isMine ? 0.45 : 0.28,
      color: cell.contested ? cell.contestedByColor : cell.ownerColor,
      weight: cell.contested ? 2 : 0.8,
      dashArray: cell.contested ? '4,4' : null,
      interactive: false
    };
    if (cellLayers[key]) {
      cellLayers[key].setStyle(opts);
    } else {
      cellLayers[key] = L.rectangle(bounds, opts).addTo(map);
    }
  });
  Object.keys(cellLayers).forEach(key => {
    if (!cells[key]) { map.removeLayer(cellLayers[key]); delete cellLayers[key]; }
  });
}

function updateScore() {
  const n = Object.values(cells).filter(c => c.owner === myUid).length;
  document.getElementById('score-pill').textContent = `${myAvatar} ${n} firkant${n !== 1 ? 'er' : ''}`;
}

function listenPlayers() {
  onValue(ref(db, `games/${gameCode}/players`), snap => {
    const players = snap.val() || {};
    const now = Date.now();
    Object.entries(players).forEach(([uid, p]) => {
      if (uid === myUid || !p.lat || !p.lng) return;
      const online = (now - p.lastSeen) < OFFLINE_MS;
      if (!online) {
        if (otherMarkers[uid]) { map.removeLayer(otherMarkers[uid]); delete otherMarkers[uid]; }
        return;
      }
      if (otherMarkers[uid]) {
        otherMarkers[uid].setLatLng([p.lat, p.lng]);
      } else {
        otherMarkers[uid] = L.marker([p.lat, p.lng], {
          icon: L.divIcon({ className:'', html:`<div class="cat-marker">${p.avatar}</div>`, iconSize:[28,28], iconAnchor:[14,14] })
        }).addTo(map);
      }
    });
  });
}

// PIS BUTTON
let myCurrentPos = null;
async function pisNow() {
  if (!myCurrentPos) { toast('Ingen GPS endnu 😿'); return; }
  const key = cellKey(myCurrentPos.lat, myCurrentPos.lng);
  await claimCell(myCurrentPos.lat, myCurrentPos.lng, key);
};

window.addEventListener('beforeunload', () => {
  if (myUid && gameCode) update(ref(db, `games/${gameCode}/players/${myUid}`), { online: false });
});

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>
